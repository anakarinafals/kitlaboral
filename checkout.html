<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar compra — KitLaboral</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:      #0A0E1A;
    --ink-soft: #2A3142;
    --paper:    #FAF8F3;
    --cream:    #F2EFE6;
    --line:     #E8E3D7;
    --accent:   #1A4A8A;
    --gold:     #C9A961;
    --muted:    #6B6F7A;
    --green:    #4A7C59;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
  .serif{font-family:'Instrument Serif',serif;font-weight:400}
  .card{width:100%;max-width:440px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:2.5rem;box-shadow:0 12px 40px rgba(10,14,26,.06)}
  .logo{font-size:1rem;font-weight:600;text-align:center;margin-bottom:2rem}
  .logo span{color:var(--accent);font-style:italic;font-family:'Instrument Serif',serif}
  .resumen{background:var(--cream);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.75rem}
  .resumen-label{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:.4rem}
  .resumen-nombre{font-size:1.15rem;font-weight:600}
  .resumen-precio{font-size:1.6rem;font-weight:700;margin-top:.5rem}
  .resumen-precio span{font-size:.9rem;font-weight:400;color:var(--muted)}
  label{display:block;font-size:.85rem;font-weight:500;margin-bottom:.5rem}
  input{width:100%;padding:.9rem 1rem;font-size:1rem;font-family:inherit;border:1px solid var(--line);border-radius:10px;background:var(--paper);transition:border-color .2s}
  input:focus{outline:none;border-color:var(--accent)}
  .ayuda{font-size:.8rem;color:var(--muted);margin-top:.5rem;line-height:1.5}
  .resumen-original{font-size:.95rem;color:var(--muted);text-decoration:line-through;font-weight:400;margin-right:.5rem}
  .resumen-cupon{font-size:.8rem;color:var(--green);font-weight:500;margin-top:.4rem;display:none}
  .cupon-toggle{display:inline-block;margin-top:1.25rem;font-size:.85rem;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;text-decoration:underline}
  .cupon-box{display:none;margin-top:.75rem;gap:.5rem}
  .cupon-box.abierto{display:flex}
  .cupon-box input{text-transform:uppercase}
  .cupon-aplicar{flex-shrink:0;padding:0 1.1rem;background:var(--ink);color:var(--paper);border:none;border-radius:10px;font-family:inherit;font-size:.85rem;font-weight:500;cursor:pointer}
  .cupon-aplicar:hover{background:var(--accent)}
  .cupon-msg{font-size:.8rem;margin-top:.5rem;display:none}
  .cupon-msg.ok{color:var(--green);display:block}
  .cupon-msg.bad{color:#B42318;display:block}
  .btn{width:100%;margin-top:1.5rem;background:var(--ink);color:var(--paper);border:none;border-radius:100px;padding:1rem;font-size:1rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn:hover{background:var(--accent)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .error{color:#B42318;font-size:.85rem;margin-top:.75rem;display:none}
  .seguro{text-align:center;font-size:.78rem;color:var(--muted);margin-top:1.5rem}
  .seguro::before{content:'🔒 ';}
  .volver{display:block;text-align:center;margin-top:1.25rem;font-size:.82rem;color:var(--muted);text-decoration:none}
  .volver:hover{color:var(--ink)}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MMNZ4TFG" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div class="card">
  <div class="logo">Kit<span>Laboral</span></div>

  <div class="resumen">
    <div class="resumen-label">Tu compra</div>
    <div class="resumen-nombre" id="nombre">—</div>
    <div class="resumen-precio" id="precio"></div>
    <div class="resumen-cupon" id="resumenCupon"></div>
  </div>

  <form id="form">
    <label for="email">Tu correo electrónico</label>
    <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required autocomplete="email">
    <p class="ayuda">Enviaremos los archivos a este correo apenas confirmes el pago. Revisa que esté bien escrito.</p>

    <button type="button" class="cupon-toggle" id="cuponToggle">¿Tienes un cupón de descuento?</button>
    <div class="cupon-box" id="cuponBox">
      <input type="text" id="cupon" placeholder="Código" autocomplete="off">
      <button type="button" class="cupon-aplicar" id="cuponAplicar">Aplicar</button>
    </div>
    <div class="cupon-msg" id="cuponMsg"></div>

    <div class="error" id="error"></div>
    <button type="submit" class="btn" id="btn">Ir a pagar con Flow →</button>
  </form>

  <p class="seguro">Pago seguro procesado por Flow</p>
  <a href="/" class="volver">← Volver</a>
</div>

<script>
  const PRODUCTOS = {
    'pack-completo':   { nombre: 'Pack Completo',              precio: 15990 },
    'kit-onboarding':  { nombre: 'Kit Onboarding',            precio: 6990  },
    'kit-liquidacion': { nombre: 'Kit Liquidación de Sueldo', precio: 8990  },
    'kit-contratos':   { nombre: 'Kit Contratos de Trabajo',  precio: 9990  },
  };

  // Solo para mostrar el precio con descuento. El cálculo real y seguro
  // se hace en el servidor (api/crear-pago.js).
  const CUPONES = {
    PRUEBA: { montoFijo: 1000 },
  };

  const params = new URLSearchParams(location.search);
  const id = params.get('producto');
  const producto = PRODUCTOS[id];

  function fmt(n) { return '$' + n.toLocaleString('es-CL'); }

  if (!producto) {
    location.href = '/';
  } else {
    document.getElementById('nombre').textContent = producto.nombre;
    pintarPrecio(producto.precio);
  }

  function pintarPrecio(valor, original) {
    const precioEl = document.getElementById('precio');
    if (original && original !== valor) {
      precioEl.innerHTML = '<span class="resumen-original">' + fmt(original) +
        '</span>' + fmt(valor) + ' <span>CLP</span>';
    } else {
      precioEl.innerHTML = fmt(valor) + ' <span>CLP</span>';
    }
  }

  let cuponAplicado = '';

  const cuponToggle = document.getElementById('cuponToggle');
  const cuponBox = document.getElementById('cuponBox');
  const cuponInput = document.getElementById('cupon');
  const cuponAplicarBtn = document.getElementById('cuponAplicar');
  const cuponMsg = document.getElementById('cuponMsg');
  const resumenCupon = document.getElementById('resumenCupon');

  cuponToggle.addEventListener('click', () => {
    cuponBox.classList.toggle('abierto');
    if (cuponBox.classList.contains('abierto')) cuponInput.focus();
  });

  cuponAplicarBtn.addEventListener('click', () => {
    const code = cuponInput.value.trim().toUpperCase();
    const desc = CUPONES[code];
    if (!desc) {
      cuponMsg.className = 'cupon-msg bad';
      cuponMsg.textContent = 'Cupón no válido.';
      cuponAplicado = '';
      pintarPrecio(producto.precio);
      resumenCupon.style.display = 'none';
      return;
    }
    const nuevo = desc.montoFijo != null
      ? desc.montoFijo
      : Math.round(producto.precio * (100 - desc.porcentaje) / 100);
    cuponAplicado = code;
    pintarPrecio(nuevo, producto.precio);
    cuponMsg.className = 'cupon-msg ok';
    cuponMsg.textContent = '¡Cupón aplicado!';
    resumenCupon.style.display = 'block';
    resumenCupon.textContent = '✓ Cupón ' + code + ' aplicado';
  });

  const form = document.getElementById('form');
  const btn = document.getElementById('btn');
  const errorEl = document.getElementById('error');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.textContent = 'Ingresa un correo válido.';
      errorEl.style.display = 'block';
      return;
    }
    errorEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Redirigiendo...';
    dataLayer.push({ event: 'inicio_pago', producto: id, cupon: cuponAplicado });
    let url = '/api/crear-pago?producto=' + encodeURIComponent(id) +
              '&email=' + encodeURIComponent(email);
    if (cuponAplicado) url += '&cupon=' + encodeURIComponent(cuponAplicado);
    location.href = url;
  });
</script>
</body>
</html>
